<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通知车主挪车</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; color: #333; }
  .container { text-align: center; padding: 20px; width: 100%; max-width: 400px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); background: #fff; }
  h1 { font-size: 24px; margin-bottom: 20px; color: #007bff; }
  p { margin-bottom: 20px; font-size: 16px; color: #555; }
  .instruction { margin-bottom: 30px; font-size: 14px; color: #666; line-height: 1.6; }
  button { width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; font-weight: bold; color: #fff; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; }
  .notify-btn { background: #28a745; }
  .notify-btn:hover { background: #218838; }
  .call-btn { background: #17a2b8; }
  .call-btn:hover { background: #138496; }
  .footer { margin-top: 30px; font-size: 12px; color: #888; }
  .status-message { margin-top: 20px; font-size: 14px; color: #666; padding: 10px; border-radius: 4px; background-color: #f8f9fa; }
</style>
</head>
<body>
<div class="container">
  <h1>通知车主挪车</h1>
  <p>如需通知车主，请点击以下按钮</p>
  <div class="instruction">
    <strong>使用说明：</strong>
    <ol>
      <li>"通知车主挪车"按钮：通过微信公众号向车主发送挪车提醒</li>
      <li>"拨打车主电话"按钮：直接拨打车主电话（需要手机设备支持）</li>
    </ol>
  </div>
  <button class="notify-btn" onclick="notifyOwner()">通知车主挪车</button>
  <button class="call-btn" onclick="callOwner()">拨打车主电话</button>
  <div id="status" class="status-message"></div>
  <div class="footer">
    <p>挪车通知服务 | 使用 PushPlus 微信推送</p>
  </div>
</div>
<script>
const phone = "19938590219";
const sendKey = "SCT91744TVuSjcfeujc92zLExnar00erm";
let isSending = false;

function notifyOwner() {
  if (isSending) { alert("正在发送通知，请稍候..."); return; }
  isSending = true;
  document.getElementById('status').innerHTML = '<span style="color:#28a745">正在发送通知...</span>';
  const params = new URLSearchParams();
  params.append('title', '挪车通知');
  params.append('desp', '您好，有人需要您挪车，请及时处理。');
  fetch("https://sctapi.ftqq.com/" + sendKey + ".send", {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: params.toString()
  })
  .then(res => res.json())
  .then(data => {
    isSending = false;
    if (data.code === 0) {
      document.getElementById('status').innerHTML = '<span style="color:#28a745">✅ 通知已成功发送！车主将很快收到微信消息。</span>';
    } else {
      document.getElementById('status').innerHTML = '<span style="color:#dc3545">❌ 发送失败：' + (data.message || '未知错误') + '</span>';
    }
  })
  .catch(err => {
    isSending = false;
    document.getElementById('status').innerHTML = '<span style="color:#dc3545">❌ 网络错误，请检查网络连接后重试。</span>';
    console.error(err);
  });
}

function callOwner() {
  if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
    window.location.href = "tel:" + phone;  // ✅ 已修复 h2ref bug
  } else {
    alert("请在手机上访问此页面以拨打电话。\n车主电话：" + phone);
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === '1' || e.key === 'n') notifyOwner();
  else if (e.key === '2' || e.key === 'c') callOwner();
});

document.getElementById('status').innerHTML = '<span style="color:#17a2b8">✅ 服务已准备就绪</span>';
</script>
</body>
</html>
